<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA RATAX - BLUE LOCK INTERFACE</title>
    <style>
        @media (max-width: 600px) {
    body {
        flex-direction: column; /* Pone la lista arriba y el chat abajo */
        padding: 10px;
    }
    .lista-animes, .chat-container {
        width: 100%; /* Ocupan todo el ancho del cel */
        height: 400px;
    }
}
        /* CSS UNIDO: Diseño Tecnológico */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
            margin: 0;
        }

        .lista-animes, .chat-container {
            background: #12171f;
            border: 2px solid #00d4ff;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        .lista-animes { width: 280px; height: 550px; padding: 20px; }
        .chat-container { width: 500px; height: 550px; }

        #lista-visual, #chat-box {
            flex-grow: 1;
            overflow-y: auto; /* BARRA DE MOVIMIENTO ACTIVA */
            padding: 10px;
        }

        #chat-box { background: #0f141a; border-radius: 10px 10px 0 0; }

        /* Estilo de Mensajes */
        .user-message {
            background: #00d4ff; color: black; align-self: flex-end;
            padding: 10px; border-radius: 10px 10px 0 10px; margin: 5px 0; font-weight: bold;
        }
        .ratax-message {
            background: #1c232d; color: white; align-self: flex-start;
            padding: 10px; border-radius: 10px 10px 10px 0; margin: 5px 0;
            border-left: 4px solid #ff0055;
        }

        /* Inputs y Botones */
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input {
            background: #0b0e14; border: 1px solid #00d4ff; color: white;
            padding: 10px; border-radius: 5px; flex-grow: 1; outline: none;
        }
        button {
            background: #00d4ff; color: black; border: none; padding: 10px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #ff0055; color: white; }

        /* Personalización del Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="lista-animes">
        <h3 style="color: #00d4ff; text-align: center; margin-top: 0;">EGOIST LIST</h3>
        <div id="lista-visual"></div>
        <div class="input-area" style="padding: 10px 0 0 0; border: none;">
            <input type="text" id="anime-input" placeholder="Añadir anime...">
            <button onclick="agregarAnime()">+</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-box" style="display: flex; flex-direction: column;">
            <div class="ratax-message">🔥 SISTEMA RATAX ONLINE. Analizando registros...</div>
        </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Escribe al sistema..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">SEND</button>
        </div>
    </div>

    <script>
        // JAVASCRIPT UNIDO
        let miLista = [];

        function agregarAnime() {
            const input = document.getElementById('anime-input');
            if(input.value.trim() !== "") {
                miLista.push(input.value);
                document.getElementById('lista-visual').innerHTML += 
                    `<div style="padding: 8px; border-bottom: 1px solid #1c232d;">> ${input.value}</div>`;
                input.value = "";
                const lv = document.getElementById('lista-visual');
                lv.scrollTop = lv.scrollHeight;
            }
        }

        async function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const userMsg = input.value;
            chatBox.innerHTML += `<div class="user-message">${userMsg}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('https://ratax.onrender.com/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: userMsg, list: miLista })
                });
                const data = await response.json();
                chatBox.innerHTML += `<div class="ratax-message">${data.reply}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="ratax-message">❌ ERROR: Servidor desconectado.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
